<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Registration form</title>
</head>
<body>
    <h1>Registration form</h1>
    <form>
        <label for="name"></label>
        First name <input type="name" placeholder="First name" id="name" required maxlength="20"> <br> <br>
        Last name  <input type="name" placeholder="Last name" required maxlength="20"> <br> <br>
        Nick name  <input type="name" placeholder="Nick name" required maxlength="15"> <br> <br>
        E-mail     <input type="email" placeholder="E-mail" required maxlength="20">   <br> <br>
        Password   <input type="password" placeholder="Password" required maxlength="20"> <br> <br>
        date of birth      <input type="date"> <br> <br>
        <p>Gender</p>Male  <input type="radio">
                    Female <input type="radio">
                    others <input type="radio">
        Mobile             <input type="number" placeholder="Mobile phone">  <br> <br>
        Address            <input type="text"> <br> <br>
                           <input type="submit"> 
                           <input type="reset">
    </form>
</body>
</html>
