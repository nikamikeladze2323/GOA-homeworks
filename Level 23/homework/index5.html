<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>h1 testing</title>
</head>
<body>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    </style>
    <h1 style="font-size: 50px; background-color: aquamarine; color: blue; text-align: center;">Hello world</h1>
    <h1 style="font-size: 50px; background-color: aquamarine; color: blue; text-align: right;">Hello world</h1>
    <h1 style="font-size: 50px; background-color: aquamarine; color: blue; padding-left: 25px;">Hello world</h1>
    <h1 style="font-size: 50px; background-color: aquamarine; color: blue; text-align: right; padding-right: 25px;">Hello world</h1>
    <h1 style="font-size: 50px; background-color: aquamarine; color: blue; text-align: center;">Hello world</h1>
</body>
</html>
