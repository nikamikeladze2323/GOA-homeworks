<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning CSS</title>
</head>
<!--შექმენით 2 p თეგი, ერთის შიგნით ჩასვით h1 ხოლო მეორის შიგნით h2, პირველი p თეგი გახადეთ ლურჯი, ხოლო მეორე p თეგი გახადეთ მწვანე, მაგრამ მეორე p თეგში ჩასმული h2ი გახადეთ წითელი-->
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    #colorblue {
        color: blue;
    }
    p{
        color: green;
    }
    h2, h1 {
        color: red;
    }
</style>
<body>
    <div>
    <p id="colorblue"> 
        hello
        <h1>hello</h1>
    </p>
    </div>
    <p>
        hi again
        <h2>hi</h2>
    </p>
</body>
</html>
