<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style css</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header{
            background-color: darkgreen;
        }
        .main{
            background-color: black;
        } 
        .h1{
            color: black;
            font-size: 50px;
            text-align: center;
            padding-bottom: 125px;
        }
        .p{
            padding-top: 125px;
            color: lightgreen;
            font-size: 30px;
            text-align: center;
        }
        button{
            color: aqua;
            background-color: blue;
            font-size:  50px;
        }
        b{
            color: red;
        }
        strong{
            color: blue;
        }
        li{
            list-style-type: none;
            color: brown;
        }
        ul li:hover{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="h1">GOA</h1>
        <p class="p">bla</p>  

    </header>

    <main class="main">
        <button>bla</button>
        <b>hello</b>
        <strong>HOLA</strong>
        <ul>
            <li><a href="#">link</a></li>
        </ul>
        
    </main>
</body>
</html>
