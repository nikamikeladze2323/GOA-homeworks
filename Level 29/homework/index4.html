<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>internal css</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .A{
            background-color: blueviolet;
        }
        .B{
            background-color: blue;
        }
        .C{
            background-color: red;
        }
        .D{
            background-color: orange;
        }
    </style>
</head>
<body>
    <p class="A">A</p>
    <p class="B">B</p>
    <p class="C">C</p>
    <p class="D">D</p>
</body>
</html>
