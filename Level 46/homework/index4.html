<!DOCTYPE html>

<body>
    <!--როგორ მუშაობს flex-ი? flex-ი აჯგუფებს ერთად ნაწერებს.-->
    <!--როგორ მუშაობს flex-direction-ი? flex-direction-ში გვაქვს ორი ესეთი ფუნქცია column და column-reverse. column აწყობს ნაწერებს ცალცალკე და
    მიჰყვება ამ ნაწერებს თავდაპირველად როგორც დაიწერა html-ში ისე რიგის მიხედვით ხოლო column-reverse პირიქით შვრება ბოლოდან იწყებს.
    -->
    <!--როგორ მუშაობს flex-grow და flex-shrink? flex-grow ადიდებს ნაწერს ხოლო flex-shrink პირიქით აპატარავებს.-->
    <!--როგორ მუშაობს flex-wrap? flex-wrap-ი ნაწერს თავისუფლებას აძლევს როდესაც ეკრანს დააპატარავებთ ნაწერიც ავტომატურად დაპატარავდება თუ
    flex-wrap-ს გამოვიყენებთ.
    -->
</body>
</html>
